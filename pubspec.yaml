name: blink_board
description: Blink Board Display Prototype - Interactive advertising display system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_windows_video: ^1.0.4
  qr_flutter: ^4.1.0
  file_picker: ^8.0.3
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  network_info_plus: ^5.0.3
  uuid: ^4.4.0
  flame: ^1.20.0
  flame_svg: ^1.12.1
  flutter_animate: ^4.5.0
  window_manager: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
